CONFIG_ZMK_KEYBOARD_NAME="Aurora Corne"

# Uncomment the following line to enable the Kyria OLED Display
# CONFIG_ZMK_DISPLAY=y

# this is off for now because https://github.com/zmkfirmware/zmk/issues/65 is not done. i want lights on layer.
# CONFIG_ZMK_RGB_UNDERGLOW=y

# this is so that the lag on the right side is minimized.
# https://zmk.dev/docs/troubleshooting#connectivity-issues
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_STUDIO=y

# Reduce cross-half keypress transposition (e.g. "gi tstatus" for "git status").
# Each half has its own BLE link to the dongle; these settings shrink the
# window in which packets from the two halves can swap order.
# See zmk#1633 — no true fix upstream, only mitigation.

# Peripheral wakes every connection interval instead of skipping up to 30.
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0

# Pin minimum 7.5ms connection interval (6 * 1.25ms). Default, made explicit.
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6

# Eager debouncing on the halves: fire press on first edge, then ignore
# bounces for 1ms. Release stays at 5ms to avoid phantom key-ups.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Larger central RX queue so bursts from both halves aren't dropped.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10
